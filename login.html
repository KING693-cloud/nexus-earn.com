<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS EARN - Login</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0b0d17;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* App Container Blueprint matching Dashboard max-width */
        .app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background: #111424;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        /* --- NOTIFICATION TOAST --- */
        .toast-notification {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            width: calc(100% - 32px);
            max-width: 400px;
            background: #1b203a;
            border-left: 4px solid #e5b842;
            padding: 16px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 50000;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notification.show { transform: translateX(-50%) translateY(0); }
        .toast-text { font-size: 0.85rem; font-weight: 600; color: #fff; }

        /* Hero Banner Section */
        .hero-banner {
            width: 100%;
            height: 35vh; 
            min-height: 240px;
            background: radial-gradient(circle at center, #1b203a 0%, #0b0d17 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            border-bottom: 1px solid rgba(229, 184, 66, 0.1);
        }

        /* Fallback Container if your logo file is missing */
        .logo-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .brand-logo {
            width: 85%; 
            max-width: 320px;
            height: auto;
            object-fit: contain;
        }

        /* Text Fallback style if logo doesn't load */
        .logo-fallback-text {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f5d061 0%, #e5b842 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Workspace Panel */
        .form-workspace {
            flex-grow: 1;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
        }

        .page-title {
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .page-subline {
            text-align: center;
            font-size: 0.8rem;
            color: #9ca3af;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .profile-input-wrapper {
            width: 100%;
            text-align: left;
        }

        .profile-input-wrapper label {
            font-size: 0.7rem;
            color: #9ca3af;
            text-transform: uppercase;
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
        }

        .input-row-container {
            width: 100%;
            background: #1b203a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            height: 46px;
        }

        .input-row-container:focus-within {
            border-color: #e5b842;
        }

        .input-row-container i {
            font-size: 0.95rem;
            color: #e5b842;
            width: 20px;
            text-align: center;
        }

        .input-row-container input {
            width: 100%;
            border: none;
            background: transparent;
            color: #ffffff;
            font-size: 0.85rem;
            height: 100%;
        }

        .input-row-container input::placeholder {
            color: #71717a;
        }

        .input-row-container input:focus {
            outline: none;
        }

        /* Optimized Recovery & Onboarding Links Grid */
        .recovery-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 8px;
        }

        .recovery-links a {
            color: #e5b842;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .recovery-links a.danger-link {
            color: #ef4444;
        }

        .recovery-links a:hover {
            text-decoration: underline;
        }

        .btn-submit {
            width: 100%;
            height: 46px;
            background: linear-gradient(135deg, #f5d061 0%, #e5b842 100%);
            border: none;
            border-radius: 8px;
            color: #111424;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
            transition: transform 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Custom Beautiful Toast Alerts Modal -->
        <div class="toast-notification" id="customToast">
            <i class="fa-solid fa-circle-check" id="toastIcon" style="color: #10b981;"></i>
            <div class="toast-text" id="toastMsg">Notification System Active.</div>
        </div>

        <div class="hero-banner">
            <div class="logo-box">
                <!-- Fallback handler built right into the tag -->
                <img src="logo.png" alt="NEXUS EARN" class="brand-logo" onerror="this.style.display='none'; document.getElementById('textLogo').style.display='block';">
                <div id="textLogo" class="logo-fallback-text" style="display: none;">NEXUS EARN</div>
            </div>
        </div>

        <div class="form-workspace">
            <h2 class="page-title">Sign In</h2>
            <p class="page-subline">Provide your account credentials to access your active revenue terminals.</p>

            <form id="nexusLoginForm">
                
                <div class="profile-input-wrapper">
                    <label>Account Identifier</label>
                    <div class="input-row-container">
                        <i class="fa-solid fa-circle-user"></i>
                        <input type="text" id="loginIdentifier" placeholder="Username, Gmail, or Phone number" required>
                    </div>
                </div>

                <div class="profile-input-wrapper">
                    <label>Security Password</label>
                    <div class="input-row-container">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="loginPass" placeholder="Enter secure password" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Verify Credentials</button>

                <div class="recovery-links">
                    <a href="forgot-password.html" class="danger-link">
                        <i class="fa-solid fa-unlock-keyhole" style="font-size: 0.75rem;"></i> Forgot Password?
                    </a>
                    <a href="index.html">Create account <i class="fa-solid fa-arrow-right-long"></i></a>
                </div>

            </form>
        </div>

    </div>

    <!-- FIREBASE INTEGRATION SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // Firebase configuration setup
        const firebaseConfig = {
            apiKey: "AIzaSyDUIQ5s-MI2V3rsi_uWBbRb5YGcFmjjKK4",
            authDomain: "nexus-earn-1.firebaseapp.com",
            projectId: "nexus-earn-1",
            storageBucket: "nexus-earn-1.firebasestorage.app",
            messagingSenderId: "779765076952",
            appId: "1:779765076952:web:fa5fac51bef82e74b598ad"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Premium Notification Center Modal
        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('customToast');
            const icon = document.getElementById('toastIcon');
            const text = document.getElementById('toastMsg');
            
            text.innerText = message;
            icon.className = isSuccess ? "fa-solid fa-circle-check" : "fa-solid fa-triangle-exclamation";
            icon.style.color = isSuccess ? "#10b981" : "#ef4444";
            
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

        document.getElementById('nexusLoginForm').addEventListener('submit', async function(event) {
            event.preventDefault(); 
            
            const inputVal = document.getElementById('loginIdentifier').value.trim();
            const passVal = document.getElementById('loginPass').value;
            
            // Gmail Formatting Guard
            if (inputVal.includes('@')) {
                if (!inputVal.toLowerCase().endsWith('@gmail.com') || inputVal.match(/@/g).length !== 1) {
                    showToast("Input contains '@' but is not a valid structured @gmail.com identifier.", false);
                    return;
                }
            }
            
            // Numeric Mobile Boundaries Guard
            const digitsMatch = inputVal.replace(/\D/g, '');
            if (digitsMatch.length > 0 && /^\d+$/.test(inputVal)) {
                if (digitsMatch.length < 10 || digitsMatch.length > 11) {
                    showToast("Pure numeric inputs must match mobile dimensions (10 or 11 digits).", false);
                    return;
                }
            }

            if (passVal.length < 4) {
                showToast("Security key length is invalid. Please double check credentials.", false);
                return;
            }

            try {
                let targetEmail = "";

                // Look up user account dynamically via custom identification strings
                if (inputVal.toLowerCase().endsWith('@gmail.com')) {
                    targetEmail = inputVal.toLowerCase();
                } else if (/^\d+$/.test(inputVal.replace(/\D/g, ''))) {
                    // Normalize phone structure to drop leading zero and query 234 schema matching register data
                    const formattedPhone = inputVal.replace(/\D/g, '').replace(/^0+/, '');
                    const phoneQuery = query(collection(db, "users"), where("phone", "==", "234" + formattedPhone));
                    const querySnap = await getDocs(phoneQuery);
                    if (!querySnap.empty) {
                        targetEmail = querySnap.docs[0].data().email;
                    }
                } else {
                    // Match identifier string query against unique username field parameter
                    const userQuery = query(collection(db, "users"), where("username", "==", inputVal));
                    const querySnap = await getDocs(userQuery);
                    if (!querySnap.empty) {
                        targetEmail = querySnap.docs[0].data().email;
                    }
                }

                if (!targetEmail) {
                    showToast("Account Error: Profile identifier not found.", false);
                    return;
                }

                // 1. Cross check login credentials against Firebase Authentication core
                const userCredential = await signInWithEmailAndPassword(auth, targetEmail, passVal);
                const authenticatedUser = userCredential.user;

                // 2. Fetch direct profile metrics document profile from users database tree
                const profileDocRef = doc(db, "users", authenticatedUser.uid);
                const profileDocSnapshot = await getDoc(profileDocRef);

                if (profileDocSnapshot.exists()) {
                    const profileData = profileDocSnapshot.data();

                    // 3. Check for specific status restrictions if necessary
                    if (profileData.status === "suspended") {
                        showToast("Account Deactivated: Access restricted by security protocols.", false);
                        await signOut(auth); 
                        return;
                    }

                    // INSTANT ROUTING: Instantly jump to dashboard with zero delay barriers!
                    window.location.href = "dashboard.html";

                } else {
                    showToast("Account Error: Profile data records missing.", false);
                    await signOut(auth);
                }

            } catch (authError) {
                console.error(authError);
                if (authError.code === 'auth/wrong-password' || authError.code === 'auth/user-not-found') {
                    showToast("Login Failed: Incorrect credential matches.", false);
                } else {
                    showToast("Access Denied: Authentication check failed.", false);
                }
            }
        });
    </script>
</body>
</html>
