<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS EARN - Statement</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --gold: #e5b842; --bg: #0b0d17; --card: rgba(27, 32, 58, 0.6); }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; }
        .app-container { max-width: 480px; margin: auto; min-height: 100vh; background: #0b0d17; padding-bottom: 30px; }
        
        .header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #1f2544; background: #161a2e; }
        .back-btn { color: var(--gold); font-size: 20px; margin-right: 15px; text-decoration: none; }
        
        .logo-box { text-align: center; padding: 20px; }
        .logo-box img { width: 80px; border-radius: 12px; }

        .nav { display: flex; padding: 0 15px 15px; gap: 10px; }
        .tab { flex: 1; padding: 10px; background: #161a2e; text-align: center; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; border: 1px solid #2d345a; }
        .tab.active { background: var(--gold); color: #000; border: none; }
        
        .pane { display: none; padding: 0 15px; }
        .pane.active { display: block; }
        
        .card { background: var(--card); backdrop-filter: blur(10px); padding: 16px; margin-bottom: 10px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .debit { border-left: 4px solid #ef4444; }
        .credit { border-left: 4px solid #10b981; }
        
        #loader { text-align: center; padding: 40px; }
        .spinner { border: 3px solid #333; border-top: 3px solid var(--gold); width: 25px; height: 25px; border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
        <span style="font-weight: 800; letter-spacing: 1px;">TRANSACTION HISTORY</span>
    </div>

    <div class="logo-box"><img src="logo.png" alt="Logo"></div>

    <div class="nav">
        <div class="tab active" onclick="switchTab(this, 'recharge')">Deposits</div>
        <div class="tab" onclick="switchTab(this, 'withdraw')">Withdrawals</div>
        <div class="tab" onclick="switchTab(this, 'earnings')">Tasks</div>
    </div>

    <div id="loader"><div class="spinner"></div></div>

    <div id="recharge" class="pane active"></div>
    <div id="withdraw" class="pane"></div>
    <div id="earnings" class="pane"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const db = getFirestore(initializeApp({
        apiKey: "AIzaSyDUIQ5s-MI2V3rsi_uWBbRb5YGcFmjjKK4",
        projectId: "nexus-earn-1"
    }));

    window.switchTab = (el, id) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(id).classList.add('active');
    };

    onAuthStateChanged(getAuth(), async (user) => {
        if (!user) return window.location.href = "login.html";

        const [ledgerSnap, withdrawSnap] = await Promise.all([
            getDocs(query(collection(db, "ledger"), where("uid", "==", user.uid))),
            getDocs(query(collection(db, "withdrawals"), where("uid", "==", user.uid)))
        ]);

        document.getElementById('loader').style.display = 'none';

        // Combine and Sort strictly by timestamp
        let allTransactions = [];
        ledgerSnap.forEach(d => allTransactions.push({ ...d.data(), id: d.id, category: 'ledger' }));
        withdrawSnap.forEach(d => allTransactions.push({ ...d.data(), id: d.id, category: 'withdraw' }));

        allTransactions.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));

        allTransactions.forEach(data => {
            const t = (data.title || "").toLowerCase();
            const amt = parseFloat(data.amount || 0);

            if (data.category === 'withdraw' || t.includes("activation") || t.includes("vip")) {
                renderCard('withdraw', data.title || "Withdrawal", amt, true);
            } else if (t.includes("paystack") || t.includes("deposit")) {
                renderCard('recharge', data.title, amt, false);
            } else {
                renderCard('earnings', data.title, amt, false);
            }
        });
    });

    function renderCard(paneId, title, amount, isDebit) {
        const div = document.createElement('div');
        div.className = `card ${isDebit ? 'debit' : 'credit'}`;
        div.innerHTML = `
            <div><strong>${title}</strong><br><small style="opacity:0.5; font-size:10px;">SUCCESSFUL</small></div>
            <div style="color:${isDebit ? '#ef4444' : '#10b981'}; font-weight:800;">
                ${isDebit ? '-' : '+'}₦${amount.toLocaleString()}
            </div>
        `;
        document.getElementById(paneId).appendChild(div);
    }
</script>
</body>
</html>
